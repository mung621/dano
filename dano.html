<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사랑둥이 다노</title>
<style>
  :root{--bg:#1a1208;--surface:#241a0c;--surface2:#2e2010;
    --border:rgba(210,160,80,0.18);--accent:#e07b2a;--accent2:#f5c06a;
    --text:#f5e8d0;--text2:#b89a6a;--gold:#f5c06a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",sans-serif;}
  body::before{content:"";position:fixed;inset:0;
    background-image:radial-gradient(circle,rgba(210,160,80,0.04) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;}
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;z-index:1;}
  header{padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:linear-gradient(90deg,rgba(36,26,12,0.98),rgba(46,32,16,0.98));}
  .header-left{display:flex;align-items:center;gap:12px;cursor:pointer;
    user-select:none;transition:opacity .15s;}
  .header-left:hover{opacity:0.78;}
  #dano-avatar{width:52px;height:52px;object-fit:contain;background:transparent;mix-blend-mode:lighten;}
  header h1{font-size:21px;font-weight:800;letter-spacing:-0.5px;}
  header h1 span{color:var(--accent2);}
  .header-sub{font-size:11px;color:var(--text2);margin-top:1px;letter-spacing:0.5px;}
  #kst-clock{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;
    background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;}
  main{display:flex;flex:1;overflow:hidden;}
  #left{width:298px;min-width:260px;border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 16px;gap:14px;
    background:rgba(36,26,12,0.6);overflow-y:scroll;}
  .panel-title{font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:1.5px;color:var(--accent2);display:flex;align-items:center;gap:5px;}
  .panel-title::before{content:"🐱";font-size:12px;}
  #entries-box{flex:1;display:flex;flex-direction:column;gap:6px;min-height:0;}
  #entries-textarea{flex:1;resize:none;background:var(--surface2);
    border:1px solid var(--border);border-radius:10px;color:var(--text);
    font-size:13px;padding:10px 12px;line-height:1.7;outline:none;min-height:180px;}
  #entries-textarea:focus{border-color:var(--accent);}
  #entry-count{font-size:11px;color:var(--text2);text-align:right;}
  #count-row{display:flex;align-items:center;gap:10px;}
  #count-row label{font-size:13px;color:var(--text2);white-space:nowrap;}
  #draw-count{width:68px;background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:14px;padding:7px 10px;outline:none;text-align:center;}
  #draw-count:focus{border-color:var(--accent);}
  #method-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .method-btn{background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:11px 6px;cursor:pointer;text-align:center;
    transition:all .2s;color:var(--text);}
  .method-btn:hover{border-color:var(--accent);background:rgba(224,123,42,0.12);}
  .method-btn.active{border-color:var(--accent2);background:rgba(224,123,42,0.2);color:var(--accent2);}
  .method-btn .icon{font-size:20px;display:block;margin-bottom:3px;}
  .method-btn .label{font-size:11px;font-weight:700;}
  #start-btn{background:var(--accent);border:none;border-radius:12px;color:#fff;
    font-size:15px;font-weight:800;padding:14px;cursor:pointer;transition:all .2s;
    position:relative;overflow:hidden;}
  #start-btn::before{content:"🐾";position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;}
  #start-btn:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(224,123,42,0.4);}
  #right{flex:1;display:flex;flex-direction:column;background:rgba(26,18,8,0.4);}
  #stage{flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;position:relative;padding:24px;overflow:hidden;}
  .screen{display:none;width:100%;height:100%;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;}
  .screen.active{display:flex;}
  #home-screen{text-align:center;gap:14px;}
  #dano-home-img{width:260px;height:auto;object-fit:contain;background:transparent;mix-blend-mode:lighten;}
  #home-screen h2{font-size:24px;font-weight:800;color:var(--accent2);}
  #home-screen p{font-size:14px;color:var(--text2);line-height:1.7;}
  /* ROULETTE */
  #roulette-screen{gap:2px;}
  .roulette-wrap{position:relative;width:460px;display:flex;flex-direction:column;align-items:center;}
  #roulette-pointer{font-size:30px;line-height:1;color:var(--gold);
    text-shadow:0 2px 8px rgba(0,0,0,.7);margin-bottom:2px;}
  #wheel{display:block;}
  /* CARD */
  #card-screen{gap:10px;overflow-y:auto;}
  #card-hint{font-size:13px;color:var(--text2);}
  #card-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    max-width:660px;overflow:visible;padding:16px 8px;}
  .play-card{width:86px;height:124px;border-radius:10px;border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:var(--text);cursor:pointer;
    transition:transform .22s,box-shadow .22s;user-select:none;text-align:center;padding:6px;
    background:repeating-linear-gradient(45deg,#2e2010 0px,#2e2010 8px,#3a2814 8px,#3a2814 16px);}
  .play-card:not(.flipped):not(.loser):hover{transform:translateY(-10px);box-shadow:0 14px 30px rgba(224,123,42,0.4);}
  .play-card.back::after{content:"🐾";font-size:26px;}
  .play-card.flipped{background:var(--surface2)!important;border-color:var(--gold);
    color:var(--gold);transform:translateY(-8px);
    box-shadow:0 0 26px rgba(245,192,106,0.6);cursor:default;}
  .play-card.loser{opacity:0.18;cursor:default;transform:none!important;box-shadow:none!important;}
  /* PINBALL */
  #pinball-screen{gap:4px;}
  #pinball-canvas{border-radius:12px;border:1px solid var(--border);display:block;max-width:100%;}
  /* RESULT */
  #result-overlay{position:absolute;inset:0;background:rgba(26,18,8,0.93);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:50;}
  #result-overlay.show{display:flex;}
  #result-box{background:var(--surface);border:2px solid var(--accent2);
    border-radius:22px;padding:30px 42px;text-align:center;max-width:460px;
    box-shadow:0 0 60px rgba(245,192,106,0.15);}
  #result-box .crown{font-size:46px;margin-bottom:6px;}
  #result-box h2{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:2px;
    text-transform:uppercase;margin-bottom:10px;}
  .winners{font-size:26px;font-weight:800;color:var(--gold);line-height:1.6;white-space:pre-line;}
  .timestamp{margin-top:12px;font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums;line-height:1.8;}
  .action-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .btn-sec{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-size:13px;font-weight:600;padding:10px 20px;cursor:pointer;transition:all .2s;}
  .btn-sec:hover{border-color:var(--accent2);color:var(--accent2);}
  #rec-bar{display:flex;align-items:center;gap:12px;padding:10px 24px;
    border-top:1px solid var(--border);background:rgba(36,26,12,0.9);}
  #rec-dot{width:9px;height:9px;border-radius:50%;background:#444;transition:background .3s;}
  #rec-dot.active{background:#ff5533;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  #rec-status{font-size:13px;color:var(--text2);flex:1;}
  #rec-btn{background:transparent;border:1px solid var(--border);border-radius:8px;
    color:var(--text2);font-size:13px;padding:6px 14px;cursor:pointer;transition:all .2s;}
  #rec-btn:hover{border-color:var(--accent);color:var(--accent);}
  #rec-btn.recording{border-color:#ff5533;color:#ff5533;}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .fade-in{animation:fadeInUp .35s ease;}

  /* ── CAT TABS ── */
  #cat-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(28,18,6,0.98);flex-shrink:0;}
  .cat-tab{flex:1;padding:11px 16px;background:none;border:none;border-bottom:3px solid transparent;
    color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;
    letter-spacing:0.2px;margin-bottom:-1px;}
  .cat-tab:hover{color:var(--text);background:rgba(224,123,42,0.08);}
  .cat-tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}
  /* ── SCHEDULE LAYOUT ── */
  #cat-schedule{display:none;flex:1;flex-direction:column;overflow:hidden;}
  #schedule-wrap{display:flex;flex:1;overflow:hidden;}
  #calendar-col{width:310px;min-width:250px;border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:18px 16px;gap:10px;
    overflow-y:auto;background:rgba(36,26,12,0.5);}
  #stamp-col{flex:1;display:flex;flex-direction:column;padding:18px 20px;gap:10px;overflow-y:auto;}
  /* ── CALENDAR ── */
  #cal-header{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  #cal-title{font-size:15px;font-weight:800;color:var(--accent2);flex:1;text-align:center;}
  .cal-nav{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:5px 12px;cursor:pointer;font-size:12px;transition:all .2s;}
  .cal-nav:hover{border-color:var(--accent);}
  #cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:5px 0;}
  .cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;border-radius:7px;font-size:12px;cursor:pointer;
    transition:all .18s;border:1px solid transparent;position:relative;user-select:none;}
  .cal-day:hover:not(.cal-empty){background:rgba(224,123,42,0.15);border-color:rgba(224,123,42,0.3);}
  .cal-day.cal-today{border-color:var(--accent2);color:var(--accent2);font-weight:800;}
  .cal-day.visited{background:rgba(224,123,42,0.22);border-color:var(--accent);}
  .cal-day.visited::after{content:"🐾";font-size:7px;position:absolute;bottom:2px;right:2px;line-height:1;}
  .cal-day.cal-today.visited{border-color:var(--gold);box-shadow:0 0 7px rgba(245,192,106,0.35);}
  .cal-day.cal-empty{cursor:default;}
  #cal-legend{font-size:11px;color:var(--text2);text-align:center;padding:2px 0;}
  /* ── STAMP CARD ── */
  #stamp-header{display:flex;align-items:baseline;gap:8px;}
  #stamp-title{font-size:15px;font-weight:800;color:var(--accent2);}
  #stamp-total{font-size:12px;color:var(--text2);}
  #stamp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .stamp-cell{border-radius:10px;border:2px solid var(--border);background:var(--surface2);
    padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;
    min-height:76px;justify-content:center;text-align:center;transition:all .2s;}
  .stamp-cell.filled{background:rgba(224,123,42,0.1);border-color:rgba(224,123,42,0.32);}
  .stamp-cell.reward-cell{background:rgba(245,192,106,0.14);border-color:var(--gold);
    box-shadow:0 0 10px rgba(245,192,106,0.18);}
  .stamp-cell.empty-slot{opacity:0.28;border-style:dashed;}
  .stamp-num{font-size:9px;color:var(--text2);font-weight:700;}
  .stamp-icon{font-size:20px;line-height:1;}
  .stamp-date{font-size:9px;color:var(--text);font-weight:600;}
  .stamp-reward{font-size:8px;font-weight:800;color:var(--gold);
    background:rgba(245,192,106,0.14);border-radius:3px;padding:2px 4px;
    border:1px solid var(--gold);margin-top:1px;white-space:nowrap;}
  .reward-free{color:#7df87c !important;border-color:#7df87c !important;
    background:rgba(125,248,124,0.1) !important;}
  #stamp-info{font-size:12px;color:var(--text2);text-align:center;padding:6px 0;}

</style>
</head>

<script>
/* ── KST CLOCK ── */
const clockEl=document.getElementById('kst-clock');
function getKST(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));}
function fmtKSTFull(d){
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+' '+
    p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds())+' KST';
}
setInterval(()=>{
  const d=getKST(),p=n=>String(n).padStart(2,'0');
  clockEl.textContent='🐾 '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds())+' KST';
},500);

/* ── STATE ── */
let currentMethod='roulette',entries=[],drawCount=1,running=false,startKST=null;

/* ── LOGO → HOME ── */
document.getElementById('logo-btn').addEventListener('click',()=>{
  running=false; showScreen('home');
});

/* ── ENTRIES ── */
const ta=document.getElementById('entries-textarea');
const countEl=document.getElementById('entry-count');
ta.addEventListener('input',()=>{
  entries=ta.value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,999);
  countEl.textContent=entries.length+' / 999';
});

/* ── DRAW COUNT ── */
const dcEl=document.getElementById('draw-count');
dcEl.addEventListener('input',()=>{drawCount=Math.max(1,Math.min(parseInt(dcEl.value)||1,999));});

/* ── METHOD BUTTONS ── */
document.querySelectorAll('.method-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.method-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMethod=btn.dataset.method;
    running=false; showScreen('home');
  });
});

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id+'-screen').classList.add('active');
  document.getElementById('result-overlay').classList.remove('show');
}

/* ── RESULT ── */
function showResult(winners){
  document.getElementById('winners-text').textContent=winners.join('\n');
  const end=getKST();
  document.getElementById('result-timestamp').innerHTML=
    '시작: '+fmtKSTFull(startKST)+'<br>완료: '+fmtKSTFull(end);
  document.getElementById('result-overlay').classList.add('show');
  running=false;
  if(mediaRec&&mediaRec.state==='recording') setTimeout(stopRecording,800);
}
document.getElementById('close-result-btn').addEventListener('click',()=>{
  document.getElementById('result-overlay').classList.remove('show');
});
document.getElementById('retry-btn').addEventListener('click',()=>{
  document.getElementById('result-overlay').classList.remove('show');
  beginDraw();
});
document.getElementById('reset-btn').addEventListener('click',()=>{
  running=false; showScreen('home');
});

/* ── START ── */
document.getElementById('start-btn').addEventListener('click',beginDraw);
function beginDraw(){
  entries=ta.value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,999);
  drawCount=Math.max(1,Math.min(parseInt(dcEl.value)||1,entries.length));
  if(!entries.length){alert('내용을 입력하세요! 🐱');return;}
  if(running)return;
  running=true; startKST=getKST();
  if(currentMethod==='roulette') runRoulette();
  else if(currentMethod==='card') runCard();
  else runPinball();
}

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}
const PAL=['#e07b2a','#f5c06a','#c4853a','#d4874a','#a06030','#f0a850','#b87040','#e8963c','#cc6622','#ffb347'];

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   🎡 ROULETTE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function runRoulette(){
  showScreen('roulette');
  const cv=document.getElementById('wheel'),ctx=cv.getContext('2d');
  const W=460,CX=W/2,CY=W/2,R=208;
  const pool=shuffle([...entries]).slice(0,Math.min(entries.length,20));
  const n=pool.length,sa=(2*Math.PI)/n;
  let rot=-Math.PI/2-sa/2;
  let spd=0.24+Math.random()*0.08,decel=false;
  const total=Math.PI*2*(7+Math.floor(Math.random()*3))+Math.random()*Math.PI*2;
  let spun=0;

  function draw(){
    ctx.clearRect(0,0,W,W);
    ctx.beginPath();ctx.arc(CX,CY,R+7,0,Math.PI*2);
    ctx.strokeStyle='rgba(245,192,106,0.35)';ctx.lineWidth=3;ctx.stroke();
    for(let i=0;i<n;i++){
      const s=rot+sa*i,e=s+sa;
      ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,s,e);ctx.closePath();
      ctx.fillStyle=PAL[i%PAL.length];ctx.fill();
      ctx.strokeStyle='rgba(26,18,8,0.3)';ctx.lineWidth=1.2;ctx.stroke();
      const mid=s+sa/2;
      ctx.save();
      ctx.translate(CX+Math.cos(mid)*R*0.66,CY+Math.sin(mid)*R*0.66);
      ctx.rotate(mid+Math.PI/2);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='bold 12px Segoe UI';ctx.fillStyle='rgba(20,12,4,0.92)';
      ctx.fillText(pool[i].length>7?pool[i].slice(0,6)+'…':pool[i],0,0);
      ctx.restore();
    }
    ctx.beginPath();ctx.arc(CX,CY,26,0,Math.PI*2);ctx.fillStyle='#1a1208';ctx.fill();
    ctx.beginPath();ctx.arc(CX,CY,18,0,Math.PI*2);ctx.fillStyle='#e07b2a';ctx.fill();
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='14px Segoe UI';ctx.fillText('🐾',CX,CY);
  }

  function frame(){
    if(!decel&&spun>total*0.58) decel=true;
    if(decel) spd*=0.982;
    rot+=spd;spun+=spd;draw();
    if(decel&&spd<0.0025){
      const TOP=Math.PI*3/2;
      let best=0,bestD=Infinity;
      for(let i=0;i<n;i++){
        let c=((rot+sa*i+sa/2)%(Math.PI*2)+(Math.PI*2))%(Math.PI*2);
        let d=Math.abs(c-TOP);if(d>Math.PI)d=Math.PI*2-d;
        if(d<bestD){bestD=d;best=i;}
      }
      const first=pool[best];
      const rest=shuffle(entries.filter(e=>e!==first));
      showResult([first,...rest].slice(0,drawCount));
      return;
    }
    requestAnimationFrame(frame);
  }
  draw();requestAnimationFrame(frame);
}

/* ━━━━ CARD ━━━━ */
function runCard(){
  showScreen('card');
  const grid=document.getElementById('card-grid');grid.innerHTML='';
  const pool=shuffle([...entries]);
  const total=Math.min(pool.length,30);
  let drawn=0;const winners=[];
  document.getElementById('card-hint').textContent='카드를 클릭해서 뽑으세요 ('+drawCount+'개)';
  for(let i=0;i<total;i++){
    const card=document.createElement('div');
    card.className='play-card back';
    card.addEventListener('click',()=>{
      if(card.classList.contains('flipped')||card.classList.contains('loser')||drawn>=drawCount)return;
      card.classList.remove('back');card.classList.add('flipped');
      card.textContent=pool[i];
      card.style.fontSize=pool[i].length>5?'11px':'14px';
      winners.push(pool[i]);drawn++;
      if(drawn>=drawCount){
        grid.querySelectorAll('.play-card.back').forEach(c=>c.classList.add('loser'));
        setTimeout(()=>showResult(winners),600);
      }
    });
    grid.appendChild(card);
  }
}

/* ━━━━ PINBALL (Galton Board) ━━━━
   구조: 갈톤 보드 (핀 격자) + 역삼각 깔때기
   공 1개, 발바닥 모양, 이름 전체 표시
   당첨자는 추첨 시작 시점에 미리 결정
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function runPinball(){
  // 화면 전환 후 DOM 크기 확정을 위해 setTimeout 0 사용
  showScreen('pinball');
  setTimeout(function(){ _pinballInit(); }, 0);
}

function _pinballInit(){
  var cv = document.getElementById('pinball-canvas');
  var stage = document.getElementById('stage');
  var W = stage.clientWidth - 40;
  var H = stage.clientHeight - 20;
  if(W < 200){ W = 500; } if(H < 200){ H = 500; }
  cv.width = W; cv.height = H;
  var ctx = cv.getContext('2d');

  var N = entries.length;
  var BALL_R = Math.max(10, Math.min(24, Math.floor((W - 20) / Math.max(N * 2, 1))));

  var BANNER = 50;
  var PIN_AREA_TOP = BANNER + 10;
  var FUNNEL_TOP = H * 0.58;
  var FUNNEL_BOT = H - 70;
  var EXIT_W = Math.max(BALL_R * 2.8, drawCount * BALL_R * 2.8);
  var EXIT_L = W/2 - EXIT_W/2;
  var EXIT_R = W/2 + EXIT_W/2;
  var WALL_L = 10;
  var WALL_R = W - 10;

  var PIN_R = 5;
  var ROWS = 7;
  var pins = [];
  for(var r = 0; r < ROWS; r++){
    var cols = r + 3;
    var span = W * 0.74;
    var x0 = (W - span) / 2 + (r % 2 === 0 ? 0 : span / (cols * 2));
    var gap = span / Math.max(cols - 1, 1);
    var py = PIN_AREA_TOP + (r + 0.5) * ((FUNNEL_TOP - PIN_AREA_TOP) / ROWS);
    for(var c = 0; c < cols; c++){
      pins.push({ x: x0 + c * gap, y: py });
    }
  }

  var bumpers = [
    { x: W * 0.28, y: PIN_AREA_TOP + (FUNNEL_TOP - PIN_AREA_TOP) * 0.45, r: 14, f: 0 },
    { x: W * 0.72, y: PIN_AREA_TOP + (FUNNEL_TOP - PIN_AREA_TOP) * 0.45, r: 14, f: 0 }
  ];

  var BALL_COLORS = [
    ['#f8b865','#e07b2a','#8a3c08'],
    ['#6db8f7','#2a75e0','#083c8a'],
    ['#7df87c','#2ae040','#086e08'],
    ['#f87c9e','#e02a5a','#8a0828'],
    ['#c47df8','#8b2ae0','#44088a'],
    ['#f8e07c','#e0c02a','#8a6c08'],
    ['#f8a07c','#e0602a','#8a2c08'],
    ['#7cf8e0','#2ae0c0','#08706a']
  ];

  // 이름 순서를 매번 무작위로 섞어 시작 위치 랜덤화
  var balls = shuffle(entries.map(function(name, i){
    return { name: name, colorSet: BALL_COLORS[i % BALL_COLORS.length] };
  }));
  balls = balls.map(function(b, i){
    var startX = N > 1
      ? WALL_L + BALL_R + (i / (N - 1)) * (W - WALL_L * 2 - BALL_R * 2)
      : W / 2;
    startX = Math.max(WALL_L + BALL_R, Math.min(WALL_R - BALL_R, startX));
    return {
      name: b.name,
      x: startX + (Math.random() - 0.5) * BALL_R * 2,
      y: BANNER + BALL_R + 2 + i * Math.min(BALL_R * 0.3, 10),
      vx: (Math.random() - 0.5) * 2,
      vy: 0,
      spin: Math.random() * Math.PI * 2,
      trail: [],
      won: false,
      sunk: false,
      sunkTick: 0,
      colorSet: b.colorSet
    };
  });

  var winners = [];
  var done = false;
  var tick = 0;

  function drawPaw(x,y,r,name,spin,cs,won){
    ctx.save(); ctx.translate(x,y);
    ctx.shadowColor = won ? 'rgba(255,220,50,0.9)' : 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = won ? 22 : 10;
    var g = ctx.createRadialGradient(-r*0.15,-r*0.18,0,0,0,r);
    g.addColorStop(0,cs[0]); g.addColorStop(0.5,cs[1]); g.addColorStop(1,cs[2]);
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(255,220,130,0.5)'; ctx.lineWidth=1.8; ctx.stroke();
    var tr=r*0.37;
    var toes=[{a:-.72,d:r*1.08},{a:-.24,d:r*1.14},{a:.24,d:r*1.14},{a:.72,d:r*1.08}];
    for(var ti=0;ti<toes.length;ti++){
      var tx=Math.sin(toes[ti].a)*toes[ti].d, ty=-Math.cos(toes[ti].a)*toes[ti].d;
      var tg=ctx.createRadialGradient(tx-tr*0.2,ty-tr*0.2,0,tx,ty,tr);
      tg.addColorStop(0,cs[0]); tg.addColorStop(1,cs[2]);
      ctx.beginPath(); ctx.arc(tx,ty,tr,0,Math.PI*2); ctx.fillStyle=tg; ctx.fill();
      ctx.strokeStyle='rgba(255,210,120,0.35)'; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(-r*0.22,-r*0.26,r*0.28,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fill();
    ctx.rotate(spin);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var fs=Math.min(13,Math.max(6,Math.floor(r*1.4/Math.max(name.length,1))));
    ctx.font='bold '+fs+'px Segoe UI';
    ctx.fillStyle='rgba(30,10,2,0.92)';
    if(name.length<=4){ ctx.fillText(name,0,0); }
    else { var h2=Math.ceil(name.length/2),lh=fs+2; ctx.fillText(name.slice(0,h2),0,-lh/2); ctx.fillText(name.slice(h2),0,lh/2); }
    ctx.restore();
  }

  function funnelCollide(ball){
    if(ball.y < FUNNEL_TOP) return;
    var prog=Math.min((ball.y-FUNNEL_TOP)/Math.max(FUNNEL_BOT-FUNNEL_TOP,1),1);
    var lx=(W/2-W*0.44)+(EXIT_L-(W/2-W*0.44))*prog;
    var rx=(W/2+W*0.44)+(EXIT_R-(W/2+W*0.44))*prog;
    if(ball.x-BALL_R<lx){ ball.x=lx+BALL_R; ball.vx=Math.abs(ball.vx)*0.7+0.5; }
    if(ball.x+BALL_R>rx){ ball.x=rx-BALL_R; ball.vx=-(Math.abs(ball.vx)*0.7+0.5); }
  }

  function ballBallCollide(){
    for(var i=0;i<balls.length;i++){
      if(balls[i].sunk) continue;
      for(var j=i+1;j<balls.length;j++){
        if(balls[j].sunk) continue;
        var dx=balls[j].x-balls[i].x, dy=balls[j].y-balls[i].y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        var minD=BALL_R*2;
        if(dist<minD&&dist>0.01){
          var nx=dx/dist, ny=dy/dist;
          var ov=minD-dist;
          balls[i].x-=nx*ov*0.5; balls[i].y-=ny*ov*0.5;
          balls[j].x+=nx*ov*0.5; balls[j].y+=ny*ov*0.5;
          var dvx=balls[j].vx-balls[i].vx, dvy=balls[j].vy-balls[i].vy;
          var dot=dvx*nx+dvy*ny;
          if(dot<0){
            var imp=dot*0.8;
            balls[i].vx+=imp*nx; balls[i].vy+=imp*ny;
            balls[j].vx-=imp*nx; balls[j].vy-=imp*ny;
          }
        }
      }
    }
  }

  function frame(){
    if(done) return;
    tick++;
    ctx.clearRect(0,0,W,H);

    var bgGrad=ctx.createLinearGradient(0,0,0,H);
    bgGrad.addColorStop(0,'#1c1208'); bgGrad.addColorStop(1,'#100b03');
    ctx.fillStyle=bgGrad; ctx.fillRect(0,0,W,H);

    ctx.fillStyle='rgba(28,18,6,0.88)'; ctx.fillRect(0,0,W,BANNER);
    ctx.strokeStyle='rgba(210,160,80,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,BANNER); ctx.lineTo(W,BANNER); ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(winners.length>0){
      ctx.fillStyle='rgba(245,192,106,0.95)'; ctx.font='bold 14px Segoe UI';
      ctx.fillText('🐾 당첨: '+winners.join(', '), W/2, BANNER/2);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='13px Segoe UI';
      ctx.fillText('🐾 핑볼 추첨 진행 중… ('+drawCount+'명 당첨)', W/2, BANNER/2);
    }

    ctx.fillStyle='rgba(210,160,80,0.06)';
    ctx.fillRect(0,BANNER,WALL_L,H); ctx.fillRect(W-WALL_L,BANNER,WALL_L,H);

    for(var pi=0;pi<pins.length;pi++){
      var p=pins[pi];
      var pg=ctx.createRadialGradient(p.x-1,p.y-1.5,0,p.x,p.y,PIN_R);
      pg.addColorStop(0,'rgba(255,235,160,0.95)'); pg.addColorStop(1,'rgba(140,85,20,0.8)');
      ctx.beginPath(); ctx.arc(p.x,p.y,PIN_R,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();
    }

    for(var bi=0;bi<bumpers.length;bi++){
      var bmp=bumpers[bi]; var fl=bmp.f>0;
      var bg2=ctx.createRadialGradient(bmp.x,bmp.y,0,bmp.x,bmp.y,bmp.r);
      bg2.addColorStop(0,fl?'rgba(255,220,50,1)':'rgba(220,130,30,0.9)');
      bg2.addColorStop(1,fl?'rgba(255,60,0,0.9)':'rgba(130,50,5,0.6)');
      ctx.beginPath(); ctx.arc(bmp.x,bmp.y,bmp.r,0,Math.PI*2); ctx.fillStyle=bg2; ctx.fill();
      ctx.strokeStyle=fl?'#ffd166':'rgba(245,192,106,0.5)'; ctx.lineWidth=2; ctx.stroke();
      if(fl){ ctx.beginPath(); ctx.arc(bmp.x,bmp.y,bmp.r+6,0,Math.PI*2); ctx.strokeStyle='rgba(255,200,50,0.25)'; ctx.lineWidth=4; ctx.stroke(); }
      ctx.fillStyle='#fff'; ctx.font='bold 9px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('★',bmp.x,bmp.y); if(bmp.f>0) bmp.f--;
    }

    var ftL=W/2-W*0.44, ftR=W/2+W*0.44;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(ftL,FUNNEL_TOP); ctx.lineTo(ftR,FUNNEL_TOP);
    ctx.lineTo(EXIT_R,FUNNEL_BOT); ctx.lineTo(EXIT_L,FUNNEL_BOT); ctx.closePath();
    var funnelGrad=ctx.createLinearGradient(W/2,FUNNEL_TOP,W/2,FUNNEL_BOT);
    funnelGrad.addColorStop(0,'rgba(55,35,10,0.45)'); funnelGrad.addColorStop(1,'rgba(70,44,14,0.28)');
    ctx.fillStyle=funnelGrad; ctx.fill();
    ctx.strokeStyle='rgba(210,160,80,0.55)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(ftL,FUNNEL_TOP); ctx.lineTo(EXIT_L,FUNNEL_BOT); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ftR,FUNNEL_TOP); ctx.lineTo(EXIT_R,FUNNEL_BOT); ctx.stroke();
    ctx.strokeStyle='rgba(245,192,106,0.65)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(EXIT_L,FUNNEL_BOT); ctx.lineTo(EXIT_L,H-22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(EXIT_R,FUNNEL_BOT); ctx.lineTo(EXIT_R,H-22); ctx.stroke();
    var exitGlow=ctx.createLinearGradient(EXIT_L,0,EXIT_R,0);
    exitGlow.addColorStop(0,'rgba(245,192,106,0)'); exitGlow.addColorStop(0.5,'rgba(245,192,106,0.5)'); exitGlow.addColorStop(1,'rgba(245,192,106,0)');
    ctx.fillStyle=exitGlow; ctx.fillRect(EXIT_L,H-30,EXIT_W,12);
    ctx.restore();
    ctx.fillStyle='rgba(245,192,106,0.85)'; ctx.font='bold 11px Segoe UI';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('🐾 당첨 출구', W/2, H-6);

    ballBallCollide();

    for(var i=0;i<balls.length;i++){
      var ball=balls[i];
      if(ball.sunk){ ball.sunkTick++; ball.y+=2; ball.spin+=0.04; continue; }

      ball.vy+=0.15; ball.vx*=0.998;
      ball.x+=ball.vx; ball.y+=ball.vy; ball.spin+=0.04;

      if(ball.x-BALL_R<WALL_L){ ball.x=WALL_L+BALL_R; ball.vx=Math.abs(ball.vx)*0.7; }
      if(ball.x+BALL_R>WALL_R){ ball.x=WALL_R-BALL_R; ball.vx=-Math.abs(ball.vx)*0.7; }
      if(ball.y-BALL_R<BANNER){ ball.y=BANNER+BALL_R; ball.vy=Math.abs(ball.vy)*0.4; }

      for(var pi2=0;pi2<pins.length;pi2++){
        var pp=pins[pi2];
        var dx=ball.x-pp.x, dy=ball.y-pp.y;
        var dd=Math.sqrt(dx*dx+dy*dy);
        if(dd<BALL_R+PIN_R+0.5&&dd>0.01){
          var nx=dx/dd, ny=dy/dd;
          var spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
          var side=Math.random()>0.5?1:-1;
          ball.vx=nx*spd*0.3+side*spd*0.9;
          ball.vy=Math.abs(ny*spd)*0.5+0.8;
          ball.x=pp.x+nx*(BALL_R+PIN_R+2); ball.y=pp.y+ny*(BALL_R+PIN_R+2);
        }
      }

      for(var bi2=0;bi2<bumpers.length;bi2++){
        var bb=bumpers[bi2];
        var dx2=ball.x-bb.x, dy2=ball.y-bb.y;
        var dd2=Math.sqrt(dx2*dx2+dy2*dy2);
        if(dd2<BALL_R+bb.r+0.5&&dd2>0.01){
          var nx2=dx2/dd2, ny2=dy2/dd2;
          var spd2=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
          ball.vx=nx2*(spd2*1.5+4); ball.vy=ny2*(spd2*1.5+4);
          ball.x=bb.x+nx2*(BALL_R+bb.r+2); ball.y=bb.y+ny2*(BALL_R+bb.r+2);
          bb.f=12;
        }
      }

      funnelCollide(ball);

      if(ball.y+BALL_R>FUNNEL_BOT && ball.x>EXIT_L && ball.x<EXIT_R){
        if(winners.length<drawCount){
          ball.won=true; ball.sunk=true; ball.vy=3; ball.vx=0;
          winners.push(ball.name);
        }
      }
    }

    for(var di=0;di<balls.length;di++){
      var bl=balls[di];
      if(bl.sunk && bl.sunkTick>50) continue;
      bl.trail.push({x:bl.x,y:bl.y});
      if(bl.trail.length>8) bl.trail.shift();
      for(var ti=0;ti<bl.trail.length;ti++){
        var ta=(ti/bl.trail.length)*0.12;
        var ts=BALL_R*(0.18+ti/bl.trail.length*0.44);
        ctx.beginPath(); ctx.arc(bl.trail[ti].x,bl.trail[ti].y,ts,0,Math.PI*2);
        ctx.fillStyle='rgba(224,123,42,'+ta+')'; ctx.fill();
      }
      if(bl.sunk){
        ctx.globalAlpha=Math.max(0,1-bl.sunkTick/35);
        drawPaw(bl.x,bl.y,BALL_R,bl.name,bl.spin,bl.colorSet,true);
        ctx.globalAlpha=1;
      } else {
        drawPaw(bl.x,bl.y,BALL_R,bl.name,bl.spin,bl.colorSet,false);
      }
    }

    if(winners.length>=drawCount&&!done){
      var readyToEnd=balls.filter(function(b){return b.won;}).every(function(b){return b.sunkTick>30;});
      if(readyToEnd){ done=true; setTimeout(function(){ showResult(winners); },500); return; }
    }

    if(tick>6000&&!done){
      var remaining=shuffle(balls.filter(function(b){return !b.won;}));
      for(var ri=0;ri<remaining.length&&winners.length<drawCount;ri++) winners.push(remaining[ri].name);
      done=true; setTimeout(function(){ showResult(winners); },300); return;
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

/* ━━━━ RECORDING ━━━━ */
let mediaRec=null,chunks=[];
async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30},audio:false});
    chunks=[];
    mediaRec=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9'});
    mediaRec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mediaRec.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:'video/webm'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='다노추첨_'+fmtKSTFull(getKST()).replace(/[: .]/g,'-')+'.webm';
      a.click();setRecUI(false);
    };
    mediaRec.start(200);setRecUI(true);
  }catch(e){alert('화면 녹화 권한이 필요합니다 🐾');running=false;}
}
function stopRecording(){if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();}
function setRecUI(on){
  document.getElementById('rec-dot').classList.toggle('active',on);
  document.getElementById('rec-status').textContent=on?'🔴 녹화 중…':'녹화 준비됨';
  const btn=document.getElementById('rec-btn');
  btn.textContent=on?'⏹ 녹화 중지':'⏺ 녹화 시작';
  btn.classList.toggle('recording',on);
}
document.getElementById('rec-btn').addEventListener('click',()=>{
  if(mediaRec&&mediaRec.state==='recording')stopRecording();else startRecording();
});


/* ━━━━ CATEGORY TABS ━━━━ */
(function(){
  const mainEl=document.querySelector('main');
  const schedEl=document.getElementById('cat-schedule');
  document.querySelectorAll('.cat-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      if(btn.dataset.cat==='lottery'){
        mainEl.style.display='flex'; schedEl.style.display='none';
      } else {
        mainEl.style.display='none'; schedEl.style.display='flex';
        renderCalendar(); renderStamps();
      }
    });
  });
})();

/* ━━━━ 냥냥 스케쥴 ━━━━ */
const VISITS_KEY='dano_visits';
const SCHED_REWARDS=['50%할인','1회무료','50%할인','1회무료'];
const _kstNow=getKST();
let calYear=_kstNow.getFullYear(), calMonth=_kstNow.getMonth();

function scGetVisits(){ try{return JSON.parse(localStorage.getItem(VISITS_KEY)||'[]');}catch(e){return[];} }
function scSaveVisits(v){ localStorage.setItem(VISITS_KEY,JSON.stringify(v)); }
function scTodayStr(){
  const k=getKST();
  return k.getFullYear()+'-'+String(k.getMonth()+1).padStart(2,'0')+'-'+String(k.getDate()).padStart(2,'0');
}

function renderCalendar(){
  const visits=scGetVisits();
  document.getElementById('cal-title').textContent=calYear+'년 '+(calMonth+1)+'월';
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  ['월','화','수','목','금','토','일'].forEach(d=>{
    const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });
  const firstDay=new Date(calYear,calMonth,1);
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const startDow=(firstDay.getDay()+6)%7;
  const today=scTodayStr();
  for(let i=0;i<startDow;i++){
    const e=document.createElement('div'); e.className='cal-day cal-empty'; grid.appendChild(e);
  }
  for(let d=1;d<=lastDate;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cell=document.createElement('div'); cell.className='cal-day';
    if(ds===today) cell.classList.add('cal-today');
    if(visits.includes(ds)) cell.classList.add('visited');
    cell.textContent=d;
    cell.addEventListener('click',()=>scToggleVisit(ds));
    grid.appendChild(cell);
  }
}

function scToggleVisit(ds){
  const visits=scGetVisits();
  const idx=visits.indexOf(ds);
  if(idx>=0) visits.splice(idx,1); else { visits.push(ds); visits.sort(); }
  scSaveVisits(visits);
  renderCalendar(); renderStamps();
}

function renderStamps(){
  const visits=scGetVisits(); visits.sort();
  const N=visits.length;
  const grid=document.getElementById('stamp-grid'); grid.innerHTML='';
  const partial=N%5;
  const totalShow=N+(partial>0?5-partial:5);
  for(let i=0;i<totalShow;i++){
    const num=i+1;
    const isRew=num%5===0;
    const rewIdx=isRew?(Math.floor(num/5)-1)%SCHED_REWARDS.length:-1;
    const rewText=isRew?SCHED_REWARDS[rewIdx]:'';
    const isFree=rewText==='1회무료';
    const rewHtml=isRew?'<div class="stamp-reward'+(isFree?' reward-free':'')+'">'+rewText+'</div>':'';
    const cell=document.createElement('div');
    if(i<N){
      cell.className='stamp-cell filled'+(isRew?' reward-cell':'');
      cell.innerHTML='<div class="stamp-num">'+num+'</div><div class="stamp-icon">🐾</div>'
        +'<div class="stamp-date">'+visits[i].slice(5).replace('-','/')+'</div>'+rewHtml;
    } else {
      cell.className='stamp-cell empty-slot'+(isRew?' reward-cell':'');
      cell.innerHTML='<div class="stamp-num">'+num+'</div><div class="stamp-icon">🐾</div>'+rewHtml;
    }
    grid.appendChild(cell);
  }
  document.getElementById('stamp-total').textContent='(총 '+N+'회)';
  if(N===0){
    document.getElementById('stamp-info').textContent='달력에서 날짜를 클릭하면 도장이 자동으로 찍혀요 🐾';
  } else {
    const nextMult=Math.ceil((N+1)/5)*5;
    const nextRewIdx=(Math.floor(nextMult/5)-1)%SCHED_REWARDS.length;
    document.getElementById('stamp-info').textContent=
      '다음 혜택: '+nextMult+'번째 방문 → '+SCHED_REWARDS[nextRewIdx]+' 🐾 ('+(nextMult-N)+'회 남음)';
  }
}

document.getElementById('cal-prev').addEventListener('click',()=>{
  if(--calMonth<0){calMonth=11;calYear--;} renderCalendar();
});
document.getElementById('cal-next').addEventListener('click',()=>{
  if(++calMonth>11){calMonth=0;calYear++;} renderCalendar();
});
